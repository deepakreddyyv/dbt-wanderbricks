snapshots:
  - name: silver_users_scd2
    relation: ref('silver_users')
    config:
      target_schema: "{{ var('silver.target_schema') }}"
      alias: silver_users
      unique_key: user_id_sk
      strategy: check
      check_cols: [name, country, user_type, is_business, company_name, email]
      hard_deletes: invalidate
      snapshot_meta_column_names:
        dbt_valid_from: start_date
        dbt_valid_to: end_date
        dbt_scd_id: scd_id
        dbt_updated_at: updated_at
        dbt_is_deleted: is_deleted

