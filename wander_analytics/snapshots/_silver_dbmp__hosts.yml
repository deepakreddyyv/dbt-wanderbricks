snapshots:
  - name: silver_hosts_scd2
    relation: ref('silver_hosts')
    config:
      target_schema: "{{ var('silver.target_schema') }}"
      alias: silver_hosts
      unique_key: host_id_sk
      strategy: check
      check_cols: [name, email, phone, is_verified, is_active, rating, country]
      hard_deletes: invalidate
      snapshot_meta_column_names:
        dbt_valid_from: record_start_date
        dbt_valid_to: record_end_date
        dbt_scd_id: record_scd_id
        dbt_updated_at: record_updated_at
        dbt_is_deleted: record_is_deleted

