models:
  - name: bronze_users
    config:
      on_schema_change: fail
      event_time: created_at
      contract: 
        enforced: "{{ var('enforce_schema_contracts') | as_bool }}"
    # constraints:
    #   - type: primary_key
    #     columns: [user_id_sk]
    columns:
      - name: user_id_sk
        description: "Surrogate key generated using dbt_utils.generate_surrogate_key function based on the user_id"
        constraints:
          - type: primary_key
            warn_unenforced: false # supported but not enforced — skip warning
            warn_unsupported: false # not supported at all — skip warning
          - type: not_null
            warn_unenforced: false # supported but not enforced — skip warning
            warn_unsupported: false # not supported at all — skip warning
            # alter the table to set the constraints, contract enforced should be enabled for this to work otherswise it will be ignored
        data_type: string

      - name: user_id
        description: "The original user ID from the source system"
        data_type: bigint
        data_tests:
          - not_null:
              config:
                severity: error
          - unique

      - name: name
        data_type: string
        description: "The name of the user"

      - name: country
        description: "The country of residence of the user"
        data_type: string

      - name: user_type
        description: "The type of user (e.g., individual, business)"
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values: ['individual', 'business'] # otherwise it warns 
              config:
                severity: warn

      - name: is_business
        description: "Flag indicating if the user is a business"
        data_type: boolean
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
              config:
                severity: warn

      - name: company_name
        description: "The company name if the user is a business"
        data_type: string

      - name: email
        description: "The email address of the user"
        data_type: string

      - name: elt_load_time
        description: >
          The timestamp when the record was loaded into the warehouse
          This column is automatically generated using current_timestamp() in the model and is used to track when the data was ingested into the warehouse.
        data_type: timestamp
      
      - name: created_at
        description: "{{ doc('created_at') }}"
        data_type: timestamp

    
