models:
  - name: bronze_users
    config:
      schema: bronze
      materialized: incremental
      unique_key: user_id_sk
      incremental_strategy: append
      on_schema_change: fail
      event_time: created_at
      contract: 
        enforced: true # "{{ var('enforce_schema_contracts') | as_bool }}"
    columns:
      - name: user_id_sk
        description: "Surrogate key generated using dbt_utils.generate_surrogate_key function based on the user_id"
        data_type: string

      - name: user_id
        description: "The original user ID from the source system"
        data_type: bigint
        data_tests:
          - not_null:
              config:
                severity: error
          - unique

      - name: name
        data_type: string
        description: "The name of the user"

      - name: country
        description: "The country of residence of the user"
        data_type: string

      - name: user_type
        description: "The type of user (e.g., individual, business)"
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values: ['V.C.'] # it will warn us because we have values 'individual', 'business' in the table not V.C.
              config:
                severity: warn

      - name: is_business
        description: "Flag indicating if the user is a business"
        data_type: boolean
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
              config:
                severity: warn

      - name: company_name
        description: "The company name if the user is a business"
        data_type: string

      - name: email
        description: "The email address of the user"
        data_type: string

      - name: elt_load_time
        data_type: timestamp
      
      - name: created_at
        data_type: timestamp
